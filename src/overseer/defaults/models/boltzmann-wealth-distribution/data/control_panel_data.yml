divider1:
  title: Parameters
row1:
  T:
    control_type: entry_block
    param_name: T
    label: $T= $
    type: scalar
    range: [100, 10000]
    scalar_type: int
    tooltip: Number of time steps to simulate
  n_agents:
    control_type: entry_block
    param_name: n_agents
    label: $n= $
    type: scalar
    range: [100, 10000]
    scalar_type: int
    tooltip: Number of agents
row2:
  transaction_type:
    param_name: transaction_type
    control_type: dropdown
    label: Transaction Type
    tooltip: ''
    names: [Unit Trannsactions, Random Amounts]
    values: [unit, random_frac]
  taxation:
    param_name: taxation
    control_type: dropdown
    label: Taxation
    tooltip: ''
    names: [None, Transaction]
    values: [None, transaction]
  tau_s:
    param_name: tau_s
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [1, 100]
    label: $\tau_s=$
    tooltip: ''
row3:
  delta:
    param_name: delta
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 1.0]
    label: $\delta=$
    tooltip: ''
  max_debt:
    param_name: max_debt
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 1000.0]
    label: $m_d=$
    tooltip: ''
