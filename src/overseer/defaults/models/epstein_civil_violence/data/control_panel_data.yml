divider1:
  title: Parameters
row1:
  width:
    param_name: width
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [10, 100]
    label: $w=$
  height:
    param_name: height
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [10, 100]
    label: $h=$
  T:
    param_name: T
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0, 10000]
    label: $T=$
row2:
  legitimacy:
    param_name: legitimacy
    tooltip: Perceived legitimacy of the existing state
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 1.0]
    label: $L=$
  active_threshold:
    param_name: active_threshold
    tooltip: Activation threshold. Citizens become active when their level of grievence
      minus their level of perceived net risk exceeds this.
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 1.0]
    label: $\Gamma=$
  max_jail_term:
    param_name: max_jail_term
    tooltip: Maximum jail sentence
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [1, 100]
    label: $J_{max}=$
row3:
  citizen_density:
    param_name: citizen_density
    tooltip: Citizen Density
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 1.0]
    label: $\rho_c=$
  cop_density:
    param_name: cop_density
    tooltip: Cop Density
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 1.0]
    label: $\rho_s=$
row4:
  citizen_vision:
    param_name: citizen_vision
    tooltip: Citizen vision range
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0, 20]
    label: $v_c=$
  cop_vision:
    param_name: cop_vision
    tooltip: Cop vision range
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0, 20]
    label: $v_s=$
  arrest_prob_const:
    param_name: arrest_prob_const
    tooltip: Perceived arrest probability modifier. Essentially, the judgement of
      how likely a citizen is to get arrested if they decide to go active is exponentially
      distributed. This is the parameter to that distribution (the mean?).
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 10.0]
    label: $\alpha=$
row5:
  movement:
    param_name: movement
    tooltip: Whether or not agents move
    control_type: checkbox
    label: Movement
  grid_type:
    param_name: grid_type
    tooltip: ''
    control_type: dropdown
    label: grid_type
    names: [Von Neumann]
    values: [Von Neumann]
