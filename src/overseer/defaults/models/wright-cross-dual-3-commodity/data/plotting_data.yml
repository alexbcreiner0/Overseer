      linestyle: dashed
      toggled: false
      traj_key: super_integrated_vals
      labels: [Super-Integrated Value of Corn, Super-Integrated Value of Iron, Super-Integrated
          Value of Sugar]
    kliman_values:
      checkbox_name: TSSI Unit Labor Values (Equilibrium)
      colors: [red, green, blue]
      label_template: TSSI Equilibrium Value of {i}
      linestyle: dotted
      toggled: false
      traj_key: kliman_values
      labels: [TSSI Equilibrium Value of Corn, TSSI Equilibrium Value of Iron, TSSI
          Equilibrium Value of Sugar]
    kliman_actual_values:
      checkbox_name: TSSI Unit Labor Values
