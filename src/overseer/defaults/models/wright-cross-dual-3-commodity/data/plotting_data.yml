      color: orange
      labels: [Okishio Predicted Profit Rates]
      special: scatter
      toggled: false
      traj_key_x: okishio_pts_x
      traj_key_y: okishio_pts_y
    value_rop:
      checkbox_name: Value Rate of Profit
      colors: [teal]
      labels: [Value Rate of Profit]
      linestyle: dashed
      toggled: false
      traj_key: value_rops
    SSSI_pi:
      checkbox_name: SSSI Value Rate of Profit
      colors: ['#edc31e']
      labels: [SSSI Value Rate of Profit]
      linestyle: solid
      toggled: false
      traj_key: SSSI_rop
    kliman_profit_rate:
      checkbox_name: TSSI Profit Rate
      colors: [brown]
      labels: [TSSI Rate of Profit]
      linestyle: dashed
      toggled: false
      traj_key: kliman_profit_rate
    exploitation:
      checkbox_name: Rate of Exploitation
