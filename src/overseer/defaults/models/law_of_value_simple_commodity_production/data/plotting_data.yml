prices_and_values:
  name: Prices and Values
  plots:
    average_prices:
      checkbox_name: Average Prices
      linestyle: solid
      linewidth: 1.5
      markersize: 6.0
      label_template: Avg Per-Period Price of C{k}
      colors: [red, blue, green, purple]
      traj_key: avg_prices_per_period
      traj_key_x: avg_interval_T
      toggled: true
    average_labor_values:
      checkbox_name: Average Labor Values
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      label_template: MELT Adjusted Value of C{k}
      colors: [red, blue, green, purple]
      traj_key: per_period_values
      traj_key_x: avg_interval_T
      toggled: true
    price_value_correlation:
      checkbox_name: Price Value Correlation
      linestyle: solid
      linewidth: 1.5
      markersize: 6.0
      labels: [Price-Value Pearson Correlation Coefficient]
      colors: [orange]
      traj_key: p_v_corr
      traj_key_x: ''
      toggled: false
    long_run_prices:
      checkbox_name: Long-Run Prices
      linestyle: solid
      linewidth: 1.5
      markersize: 6.0
      label_template: Price of C{k}
      colors: [red, blue, green, purple]
      traj_key: avg_prices
      traj_key_x: ''
      toggled: false
    long_run_values:
      checkbox_name: Long-Run Values
      linestyle: dashed
      linewidth: 1.5
      markersize: 6.0
      label_template: Long-Run Labor Value C{k}
      colors: [red, blue, green, purple]
      traj_key: values
      traj_key_x: ''
      toggled: false
    average_melt:
      checkbox_name: Average MELT
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      labels: [Per-Period MELT]
      colors: ['#ff3cb1']
      traj_key: per_period_MELT
      traj_key_x: avg_interval_T
      toggled: false
    long_run_melt:
      checkbox_name: Long-Run MELT
      linestyle: solid
      linewidth: 1.5
      markersize: 6.0
      labels: [MELT]
      colors: ['#ff3cb1']
      traj_key: MELT
      traj_key_x: ''
      toggled: false
    gini_coefficient:
      checkbox_name: Gini  Coefficient
      linestyle: solid
      linewidth: 1.5
      markersize: 6.0
      labels: [Gini Coefficient]
      colors: ['#00d0ff']
      traj_key: gini
      traj_key_x: ''
      toggled: false
    theoretical_prices:
      checkbox_name: Theoretical Prices
      linestyle: dotted
      linewidth: 1.5
      markersize: 6.0
      label_template: Diff Eq Price C{k}
      colors: ['#ff631a', '#228dff', '#51ff2a', '#cd7dff']
      traj_key: diff_eq_prices
      traj_key_x: diff_eq_T
      toggled: false
  default_lims: [[0.0, 1200.0], [-15.4323, 201.782]]
wealth_distribution:
  name: Wealth Distribution
  plots:
    wealth:
      special: hist
      checkbox_name: Wealth
      toggled: true
      dist: wealth
      density: false
      label: Agent Wealth
      color: red
      edgecolor: black
      histtype: bar
      gradient: None
      align: left
  default_lims: [[0.0, 2000.0], [0.0, 50000.0]]
