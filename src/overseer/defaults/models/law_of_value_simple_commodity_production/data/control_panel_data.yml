divider1:
  title: Parameters
row1:
  N:
    param_name: N
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0, 10000]
    label: $N=$
  M:
    param_name: M
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0, 500000]
    label: $M=$
  L:
    param_name: L
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0.0, 10.0]
    label: $L=$
row2:
  R:
    param_name: R
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0, 50]
    label: $R=$
  C:
    param_name: C
    tooltip: ''
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0, 5]
    label: $C=$
  T:
    param_name: T
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0.0, 100000.0]
    label: $T=$
    tooltip: ''
row3:
  max_trade_attempts:
    param_name: max_trade_attempts
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0.0, 100.0]
    label: $k=$
    tooltip: Max number of trade attempts per agent during a time step (ideally this
      should be infinity, but this can slow down the simulation a lot). To set equal
      to inifinity is equivalent to setting it equal to zero.
  avg_interval:
    param_name: avg_interval
    control_type: entry_block
    type: scalar
    scalar_type: int
    range: [0.0, 100.0]
    label: $T'=$
    tooltip: Averaging interval
row4:
  use_custom_l:
    param_name: use_custom_l
    control_type: checkbox
    label: Use Specific l
    tooltip: null
  use_custom_c:
    param_name: use_custom_c
    control_type: checkbox
    label: Use Specific c
    tooltip: null
row5:
  l:
    param_name: l
    control_type: entry_block
    type: vector
    label: $\mathbf{l}=$
    tooltip: ''
    dim_from: L
    safe_default: 1
  c:
    param_name: c
    control_type: entry_block
    type: vector
    label: $\mathbf{c}=$
    tooltip: ''
    dim_from: L
    safe_default: 10
row6:
  omega:
    param_name: omega
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [0.0, 1.0]
    label: $\omega=$
    tooltip: ''
row7:
  generation:
    control_type: button_group
    names: [Random Parameters]
    tooltips:
    - Generate random parameters.
    display: horizontal
    functions:
    - random_parameters
    param_name: generation
  tol:
    param_name: tol
    control_type: entry_block
    type: scalar
    scalar_type: float
    range: [-0.1, 0.2]
    label: $\epsilon=$
    tooltip: 'Tolerance for the dot product of $\mathbf{l}$ with $\frac{1}{\mathbf{c}}$
      (i.e. what they call $\eta$. If this is positive, then sim targets eta values
      above 1 within the tolerance (e.g. surplus producing economies). If it is negative,
      then sim targets eta values below 1 within the tolerance (e.g. deficit economies).
      A good faith presentation of the model would target the former. '
